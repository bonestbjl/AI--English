<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Real Scene English - 真实场景英语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "sans-serif",
              ],
            },
            colors: {
              banana: "#ffd86b",
              coral: "#ff7b6e",
              cream: "#fff8e7",
              ink: "#263238",
              leaf: "#2f8f5b",
              moss: "#1f6b48",
              nightglass: "rgba(17, 35, 25, 0.68)",
            },
            boxShadow: {
              glow: "0 18px 55px rgba(18, 45, 28, 0.32)",
              label: "0 12px 28px rgba(11, 32, 20, 0.28)",
            },
          },
        },
      };
    </script>
    <style>
      @keyframes leafDrift {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(-1deg); }
        50% { transform: translate3d(10px, -5px, 0) rotate(2deg); }
      }

      @keyframes lightBreath {
        0%, 100% { opacity: 0.23; transform: translate3d(-2%, -1%, 0) scale(1); }
        50% { opacity: 0.42; transform: translate3d(2%, 1%, 0) scale(1.06); }
      }

      @keyframes sceneReveal {
        from { opacity: 0; filter: blur(8px); transform: scale(1.08); }
        to { opacity: 1; filter: blur(0); transform: scale(1); }
      }

      @keyframes walkingFlash {
        0% { opacity: 0; transform: scale(1); filter: blur(0); }
        35% { opacity: 0.62; transform: scale(1.06); filter: blur(4px); }
        100% { opacity: 0; transform: scale(1.18); filter: blur(0); }
      }

      @keyframes hudFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      @keyframes hotspotPulse {
        0%, 100% { box-shadow: 0 10px 24px rgba(44, 28, 13, 0.24), 0 0 0 0 rgba(255, 238, 176, 0.34); }
        50% { box-shadow: 0 14px 30px rgba(44, 28, 13, 0.28), 0 0 0 8px rgba(255, 238, 176, 0); }
      }

      @keyframes hotspotBreathe {
        0%, 100% { transform: translate(-50%, -50%) translateY(0) scale(1); }
        50% { transform: translate(-50%, -50%) translateY(-2px) scale(1.01); }
      }

      @keyframes tapBounce {
        0% { transform: translate(-50%, -50%) scale(1); }
        45% { transform: translate(-50%, -50%) scale(0.9); }
        100% { transform: translate(-50%, -50%) scale(1); }
      }

      @keyframes clickRipple {
        from { opacity: 0.85; transform: translate(-50%, -50%) scale(0.45) rotate(-8deg); }
        to { opacity: 0; transform: translate(-50%, -70%) scale(1.65) rotate(12deg); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes welcomeFadeOut {
        from { opacity: 1; filter: blur(0); }
        to { opacity: 0; filter: blur(8px); }
      }

      @keyframes welcomeProgress {
        from { transform: scaleX(1); }
        to { transform: scaleX(0); }
      }

      @keyframes cardSlideIn {
        from { opacity: 0; transform: translateX(38px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes choicePop {
        0% { transform: scale(1); }
        45% { transform: scale(0.97); }
        100% { transform: scale(1); }
      }

      @keyframes soundBars {
        0%, 100% { transform: scaleY(0.45); opacity: 0.55; }
        50% { transform: scaleY(1); opacity: 1; }
      }

      @keyframes pandaBreath {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.18; }
        50% { transform: translate(-50%, -52%) scale(1.08); opacity: 0.32; }
      }

      @keyframes pandaSnack {
        0%, 100% { transform: translateY(0) rotate(-8deg) scale(1); opacity: 0.7; }
        50% { transform: translateY(5px) rotate(6deg) scale(0.92); opacity: 1; }
      }

      @keyframes actionToast {
        0% { opacity: 0; transform: translate(-50%, 10px) scale(0.98); }
        14% { opacity: 1; transform: translate(-50%, 0) scale(1); }
        82% { opacity: 1; transform: translate(-50%, 0) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -8px) scale(0.98); }
      }

      @keyframes bambooLeafSway {
        0%, 100% { transform: translateX(0) rotate(-2deg); }
        50% { transform: translateX(8px) rotate(3deg); }
      }

      @keyframes monkeyHop {
        0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(-4deg); opacity: 0.34; }
        38% { transform: translate(-50%, -56%) translateY(-16px) rotate(6deg); opacity: 0.5; }
        68% { transform: translate(-47%, -50%) translateY(2px) rotate(-2deg); opacity: 0.42; }
      }

      @keyframes playfulLeaves {
        0% { opacity: 0; transform: translateY(8px) rotate(-12deg) scale(0.78); }
        35% { opacity: 0.9; }
        100% { opacity: 0; transform: translateY(-34px) rotate(18deg) scale(1.08); }
      }

      @keyframes waterDrop {
        0% { opacity: 0; transform: translate(0, 0) scale(0.62); }
        20% { opacity: 0.9; }
        100% { opacity: 0; transform: translate(var(--drop-x), var(--drop-y)) scale(1); }
      }

      @keyframes lionSoftShake {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        22% { transform: translate3d(-3px, 1px, 0) scale(1.004); }
        48% { transform: translate3d(3px, -1px, 0) scale(1.006); }
        72% { transform: translate3d(-1px, 1px, 0) scale(1.002); }
      }

      @keyframes warmRoar {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
        28% { opacity: 0.34; }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.9); }
      }

      @keyframes roarDim {
        0%, 100% { opacity: 0; }
        24% { opacity: 0.22; }
        72% { opacity: 0.14; }
      }

      @keyframes pandaNibble {
        0%, 100% { transform: translateY(0) rotate(-3deg); }
        50% { transform: translateY(4px) rotate(4deg); }
      }

      @keyframes giraffeReachGlow {
        0%, 100% { transform: translate(-50%, -50%) translateY(0) scale(1); opacity: 0.16; }
        50% { transform: translate(-50%, -54%) translateY(-8px) scale(1.1); opacity: 0.28; }
      }

      @keyframes tallLeavesRustle {
        0%, 100% { transform: translateX(0) rotate(-2deg); opacity: 0.26; }
        50% { transform: translateX(10px) rotate(4deg); opacity: 0.42; }
      }

      @keyframes tigerForestShadow {
        0%, 100% { opacity: 0.08; }
        45% { opacity: 0.2; }
        72% { opacity: 0.14; }
      }

      @keyframes grassWhisper {
        0%, 100% { transform: translateX(0) rotate(-1deg); opacity: 0.24; }
        50% { transform: translateX(12px) rotate(3deg); opacity: 0.42; }
      }

      @keyframes tigerStalkDrift {
        0% { opacity: 0; transform: translateX(-10px) scale(0.96); }
        28% { opacity: 0.3; }
        100% { opacity: 0; transform: translateX(22px) scale(1.08); }
      }

      @keyframes savannaWind {
        0%, 100% { transform: translateX(0) rotate(-1deg); opacity: 0.2; }
        50% { transform: translateX(18px) rotate(2deg); opacity: 0.36; }
      }

      @keyframes zebraGallopDrift {
        0% { opacity: 0; transform: translateX(-22px) scale(0.94); }
        24% { opacity: 0.34; }
        100% { opacity: 0; transform: translateX(36px) scale(1.08); }
      }

      @keyframes sunlitSweep {
        0% { opacity: 0; transform: translateX(-18%) skewX(-8deg); }
        30% { opacity: 0.22; }
        100% { opacity: 0; transform: translateX(18%) skewX(-8deg); }
      }

      @keyframes pondRipple {
        0%, 100% { transform: translateX(0) scale(1); opacity: 0.16; }
        50% { transform: translateX(8px) scale(1.05); opacity: 0.3; }
      }

      @keyframes reedSway {
        0%, 100% { transform: translateX(0) rotate(-2deg); opacity: 0.24; }
        50% { transform: translateX(10px) rotate(3deg); opacity: 0.42; }
      }

      @keyframes hippoYawnDrift {
        0% { opacity: 0; transform: translateY(8px) scale(0.86); }
        28% { opacity: 0.36; }
        100% { opacity: 0; transform: translateY(-12px) scale(1.28); }
      }

      .hotspot-label {
        max-width: min(42vw, 168px);
        overflow-wrap: anywhere;
        text-wrap: balance;
      }

      .hotspot-sign {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 245, 204, 0.28), transparent 28%),
          linear-gradient(145deg, rgba(140, 91, 45, 0.9), rgba(88, 57, 31, 0.86));
        border-color: rgba(255, 232, 162, 0.82);
        color: #fff8e7;
        box-shadow: 0 12px 26px rgba(44, 28, 13, 0.26);
      }

      .hotspot-sign::before {
        content: "";
        position: absolute;
        left: 12px;
        top: -7px;
        width: 15px;
        height: 10px;
        border-radius: 999px 999px 999px 0;
        background: linear-gradient(135deg, #82bd63, #3f7f45);
        transform: rotate(-24deg);
        box-shadow: 0 2px 7px rgba(31, 79, 38, 0.22);
      }

      .hotspot-sign::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -7px;
        width: 12px;
        height: 12px;
        border-right: 1px solid rgba(255, 232, 162, 0.6);
        border-bottom: 1px solid rgba(255, 232, 162, 0.6);
        background: rgba(98, 63, 34, 0.9);
        transform: translateX(-50%) rotate(45deg);
        border-radius: 2px;
      }

      .hotspot-sign:hover {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 248, 220, 0.34), transparent 30%),
          linear-gradient(145deg, rgba(158, 105, 53, 0.96), rgba(96, 65, 36, 0.94));
        box-shadow: 0 16px 34px rgba(44, 28, 13, 0.34), 0 0 20px rgba(255, 230, 142, 0.22);
      }

      .hotspot-sign.is-learned {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 248, 220, 0.24), transparent 28%),
          linear-gradient(145deg, rgba(84, 116, 70, 0.78), rgba(55, 82, 54, 0.76));
        border-color: rgba(207, 236, 164, 0.64);
        opacity: 0.82;
      }

      .hotspot-sign.is-action {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 250, 219, 0.36), transparent 30%),
          linear-gradient(145deg, rgba(166, 103, 46, 0.98), rgba(102, 62, 31, 0.96));
        border-color: rgba(255, 238, 176, 0.98);
        box-shadow: 0 14px 34px rgba(80, 43, 15, 0.36), 0 0 18px rgba(255, 216, 107, 0.18);
        opacity: 1;
      }

      .hotspot-sign.is-action::before {
        background: linear-gradient(135deg, #ffd86b, #82bd63);
      }

      .hotspot-sub {
        color: #ffe7a3;
      }

      .hotspot-type-badge {
        letter-spacing: 0.08em;
      }

      .hotspot-sign.is-learned .hotspot-sub {
        color: #ffffff;
      }

      @media (max-width: 640px) {
        .hotspot-label {
          max-width: 124px;
        }
      }

      @media (orientation: landscape) and (max-height: 520px) and (max-width: 950px) and (hover: none) and (pointer: coarse) {
        html,
        body,
        #root {
          min-height: 100dvh;
          overflow-x: hidden;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
        }

        .home-page,
        .scene-select-page,
        .scene-page {
          min-height: 100dvh !important;
        }

        .home-page section {
          min-height: 100dvh !important;
          padding-top: 0.75rem !important;
          padding-bottom: 0.75rem !important;
        }

        .home-page .dialogue-enter {
          max-width: 34rem !important;
          transform: translateY(0) !important;
        }

        .home-page h1 {
          margin-top: 0.75rem !important;
          font-size: clamp(2.1rem, 7vw, 3rem) !important;
          line-height: 1.02 !important;
        }

        .home-page p {
          margin-top: 0.35rem !important;
          font-size: 0.78rem !important;
          line-height: 1.35 !important;
        }

        .home-page button {
          margin-top: 0.9rem !important;
          padding: 0.65rem 1.35rem !important;
          font-size: 0.9rem !important;
        }

        .home-page nav {
          top: calc(env(safe-area-inset-top) + 0.45rem) !important;
          right: 0.65rem !important;
          gap: 0.4rem !important;
        }

        .home-page nav button {
          margin-top: 0 !important;
          padding: 0.4rem 0.75rem !important;
          font-size: 0.68rem !important;
        }

        .scene-select-page {
          height: 100dvh !important;
          max-height: 100dvh !important;
          padding: 0.6rem !important;
          padding-bottom: calc(env(safe-area-inset-bottom) + 1rem) !important;
          overflow-x: hidden !important;
          overflow-y: auto !important;
          overscroll-behavior-y: contain;
          -webkit-overflow-scrolling: touch;
          touch-action: pan-y;
        }

        .scene-select-page > .relative {
          min-height: max-content !important;
          padding-bottom: 0.5rem !important;
        }

        .scene-select-page header {
          padding: 0.8rem !important;
          border-radius: 1.1rem !important;
        }

        .scene-select-page h1 {
          font-size: 2rem !important;
          line-height: 1.05 !important;
        }

        .scene-select-page section {
          margin-top: 0.7rem !important;
          grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
          gap: 0.6rem !important;
        }

        .scene-select-page article {
          padding: 0.75rem !important;
          border-radius: 1.1rem !important;
        }

        .scene-select-page article > div:first-child {
          height: 5.4rem !important;
          margin-bottom: 0.65rem !important;
          border-radius: 0.85rem !important;
        }

        .scene-select-page article h2 {
          font-size: 1.3rem !important;
        }

        .scene-select-page article p {
          font-size: 0.72rem !important;
          line-height: 1.35 !important;
          margin-top: 0.35rem !important;
        }

        .scene-select-page article button {
          margin-top: 0.6rem !important;
          padding: 0.55rem 0.8rem !important;
          border-radius: 0.85rem !important;
          font-size: 0.75rem !important;
        }

        .scene-hud {
          left: 0.5rem !important;
          right: 0.5rem !important;
          top: calc(env(safe-area-inset-top) + 0.35rem) !important;
          max-width: none !important;
          padding: 0.45rem 0.6rem !important;
          gap: 0.45rem !important;
          border-radius: 0.95rem !important;
        }

        .scene-hud h1 {
          font-size: 0.92rem !important;
          line-height: 1.1 !important;
        }

        .scene-hud p {
          font-size: 0.52rem !important;
          letter-spacing: 0.12em !important;
        }

        .scene-hud button {
          padding: 0.35rem 0.55rem !important;
          font-size: 0.68rem !important;
        }

        .mobile-landscape-mode .scene-hud-secondary {
          display: inline-flex !important;
          padding: 0.32rem 0.5rem !important;
          font-size: 0.62rem !important;
        }

        .observe-panel {
          left: 0.55rem !important;
          top: calc(env(safe-area-inset-top) + 3.65rem) !important;
          max-width: 16.8rem !important;
          max-height: 4.7rem !important;
          padding: 0.55rem !important;
          border-radius: 0.85rem !important;
        }

        .observe-panel p {
          font-size: 0.62rem !important;
          line-height: 1.25 !important;
        }

        .npc-dialogue {
          left: 0.55rem !important;
          bottom: calc(env(safe-area-inset-bottom) + 4.4rem) !important;
          width: 18.5rem !important;
          max-width: 42vw !important;
          max-height: 8.5rem !important;
          padding: 0.55rem !important;
          border-radius: 0.9rem !important;
        }

        .npc-dialogue p,
        .npc-dialogue button {
          font-size: 0.62rem !important;
          line-height: 1.25 !important;
        }

        .complete-card,
        .now-card {
          right: 0.6rem !important;
          max-width: 15rem !important;
          max-height: 5.8rem !important;
          padding: 0.55rem 0.7rem !important;
          border-radius: 0.9rem !important;
        }

        .complete-card {
          top: calc(env(safe-area-inset-top) + 3.65rem) !important;
        }

        .now-card {
          bottom: calc(env(safe-area-inset-bottom) + 4.55rem) !important;
        }

        .complete-card p,
        .now-card p {
          font-size: 0.62rem !important;
          line-height: 1.25 !important;
        }

        .trip-map {
          left: auto !important;
          right: calc(env(safe-area-inset-right) + 0.55rem) !important;
          bottom: calc(env(safe-area-inset-bottom) + 0.45rem) !important;
          max-width: min(32rem, calc(100vw - 1.1rem)) !important;
          padding: 0.5rem !important;
          border-radius: 0.9rem !important;
        }

        .mobile-landscape-mode .observe-panel,
        .mobile-landscape-mode .npc-dialogue,
        .mobile-landscape-mode .trip-map {
          z-index: 55 !important;
        }

        .mobile-landscape-toggle {
          min-width: 4.8rem;
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 999px;
          background: rgba(17, 35, 25, 0.76);
          padding: 0.38rem 0.6rem;
          color: #fff8df;
          font-size: 0.68rem;
          font-weight: 900;
          line-height: 1.05;
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
          backdrop-filter: blur(14px);
        }

        .mobile-landscape-dock {
          position: absolute;
          bottom: calc(env(safe-area-inset-bottom) + 0.45rem);
          left: calc(env(safe-area-inset-left) + 0.55rem);
          z-index: 48;
          display: flex;
          max-width: calc(100vw - 7rem);
          gap: 0.35rem;
          overflow-x: auto;
          padding-bottom: 0.1rem;
          -webkit-overflow-scrolling: touch;
        }

        .mobile-trip-mini {
          position: absolute;
          right: calc(env(safe-area-inset-right) + 0.55rem);
          bottom: calc(env(safe-area-inset-bottom) + 0.45rem);
          z-index: 48;
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 999px;
          background: rgba(17, 35, 25, 0.78);
          padding: 0.42rem 0.7rem;
          color: #fff8df;
          font-size: 0.68rem;
          font-weight: 900;
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
          backdrop-filter: blur(14px);
        }

        .mobile-panel-close {
          position: absolute;
          right: 0.55rem;
          top: 0.5rem;
          z-index: 2;
          display: grid;
          height: 1.55rem;
          width: 1.55rem;
          place-items: center;
          border-radius: 999px;
          background: rgba(255, 255, 255, 0.14);
          color: white;
          font-size: 1.1rem;
          font-weight: 900;

          left: calc(env(safe-area-inset-left) + 0.6rem) !important;
          top: calc(env(safe-area-inset-top) + 4.25rem) !important;
          max-height: calc(100dvh - 5.4rem) !important;

          padding: 0.75rem 2.4rem 0.75rem 0.85rem !important;

          padding: 0.75rem !important;
          padding-top: 2.25rem !important;
        }

        .mobile-landscape-mode .trip-map {

          right: calc(env(safe-area-inset-right) + 0.6rem) !important;

          max-height: calc(100dvh - 4.4rem) !important;

          pointer-events: none !important;
        }

        .mobile-landscape-mode .action-toast {
          left: auto !important;
          right: calc(env(safe-area-inset-right) + 0.6rem) !important;
          top: auto !important;

          text-align: left !important;

        .mobile-landscape-mode .action-toast p:first-child {

          letter-spacing: 0.1em !important;
        }

        .mobile-landscape-mode .action-toast p:nth-child(2) {

          line-height: 1.25 !important;
        }

        .mobile-landscape-mode .action-toast p:nth-child(3) {
          font-size: 0.62rem !important;
          line-height: 1.25 !important;
        }

          font-size: 0.55rem !important;
          letter-spacing: 0.12em !important;
        }

          height: 0.35rem !important;
        }

        .trip-map .h-8 {
          height: 1.45rem !important;
        }

        .trip-map .w-8 {
          width: 1.45rem !important;
        }

        .trip-map .text-\[10px\] {
          font-size: 0.5rem !important;
        }

        .hotspot-sign {
          max-width: 6.4rem !important;
          padding: 0.26rem 0.42rem !important;
          border-radius: 0.65rem !important;
        }

        .hotspot-label {
          max-width: 5.8rem !important;
          font-size: 0.58rem !important;
          line-height: 1.1 !important;
        }

        .hotspot-sub {
          margin-top: 0.12rem !important;
          font-size: 0.48rem !important;

      function pickBestEnglishVoice(voices) {
        if (!voices.length) return cachedEnglishVoice;
        const priorityNames = [
          "Google US English",
          "Google UK English Female",
          "Microsoft Jenny",
          "Samantha",
          "Alex",
          "Daniel",
        ];

        const englishVoices = voices.filter((voice) =>
          voice.lang?.toLowerCase().startsWith("en")
        );

        const byPriorityName = priorityNames
          .map((name) =>
            englishVoices.find((voice) =>
              voice.name.toLowerCase().includes(name.toLowerCase())
            )
          )
          .find(Boolean);

        const naturalEnglish = englishVoices.find((voice) => {
          const name = voice.name.toLowerCase();
          return (
            ["google", "microsoft", "samantha", "alex", "daniel"].some((token) =>
              name.includes(token)
            ) && ["en-us", "en-gb"].includes(voice.lang.toLowerCase())
          );
        });

        const usOrGb = englishVoices.find((voice) =>
          ["en-us", "en-gb"].includes(voice.lang.toLowerCase())
        );

        return byPriorityName || naturalEnglish || usOrGb || englishVoices[0] || voices[0] || null;
      }

      function loadEnglishVoices() {
        if (!("speechSynthesis" in window)) return null;
        const voices = window.speechSynthesis.getVoices();
        cachedEnglishVoice = pickBestEnglishVoice(voices);
        return cachedEnglishVoice;
      }

          const saved = JSON.parse(window.localStorage.getItem(WORD_BOOK_STORAGE_KEY) || "[]");

          return saved.map(normalizeWordBookEntry).filter(Boolean);

      function useViewportSize() {
        const [size, setSize] = useState({
          width: window.innerWidth || 1280,
          height: window.innerHeight || 720,
        });

        useEffect(() => {
          function handleResize() {
            setSize({
              width: window.innerWidth || 1280,
              height: window.innerHeight || 720,
            });
          }

          window.addEventListener("resize", handleResize);
          window.addEventListener("orientationchange", handleResize);
          return () => {
            window.removeEventListener("resize", handleResize);
            window.removeEventListener("orientationchange", handleResize);
          };
        }, []);

        return size;

      function shouldShowLandscapePrompt(viewport) {
        if (typeof window === "undefined") return false;
        const isPortrait = viewport.width < viewport.height;
        const isSmallScreen = viewport.width <= 900;
        const hasTouch =
          (typeof navigator !== "undefined" && navigator.maxTouchPoints > 0) ||
          window.matchMedia?.("(hover: none) and (pointer: coarse)")?.matches;
        return Boolean(hasTouch && isSmallScreen && isPortrait);
      }

      function shouldUseMobileLandscapeMode(viewport) {
        if (typeof window === "undefined") return false;
        const isLandscape = viewport.width > viewport.height;
        const isSmallLandscape = viewport.width <= 950 && viewport.height <= 520;
        const hasTouch =
          (typeof navigator !== "undefined" && navigator.maxTouchPoints > 0) ||
          window.matchMedia?.("(hover: none) and (pointer: coarse)")?.matches;
        return Boolean(hasTouch && isLandscape && isSmallLandscape);

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function estimateHotspotSize(hotspot, isMobile, isMobileLandscape = false) {
        const longest = Math.max(hotspot.label.length, hotspot.zh.length);
        const maxWidth = isMobileLandscape ? 104 : isMobile ? 124 : 168;
        const minWidth = isMobileLandscape ? 58 : isMobile ? 72 : 82;
        const charWidth = isMobileLandscape ? 6.3 : isMobile ? 7.2 : 8.2;
        const width = clamp(longest * charWidth + 30, minWidth, maxWidth);
        const lines = Math.ceil((longest * charWidth + 30) / maxWidth);
        const baseHeight = isMobileLandscape ? 34 : 42;
        const height = clamp(baseHeight + (lines - 1) * 13, baseHeight, isMobileLandscape ? 62 : isMobile ? 76 : 84);
        return { width, height };
      }

      function rectFromPoint(point) {
        return {
          left: point.x - point.width / 2,
          right: point.x + point.width / 2,
          top: point.y - point.height / 2,
          bottom: point.y + point.height / 2,
        };
      }

      function rectsOverlap(a, b, gap = 0) {
        return (
          a.left - gap < b.right &&
          a.right + gap > b.left &&
          a.top - gap < b.bottom &&
          a.bottom + gap > b.top
        );
      }

      function pushAwayFromRect(point, rect, gap) {
        const self = rectFromPoint(point);
        if (!rectsOverlap(self, rect, gap)) return point;

        const pushLeft = Math.abs(self.right - rect.left);
        const pushRight = Math.abs(rect.right - self.left);
        const pushUp = Math.abs(self.bottom - rect.top);
        const pushDown = Math.abs(rect.bottom - self.top);
        const minPush = Math.min(pushLeft, pushRight, pushUp, pushDown);

        if (minPush === pushLeft) point.x -= pushLeft + gap;
        else if (minPush === pushRight) point.x += pushRight + gap;
        else if (minPush === pushUp) point.y -= pushUp + gap;
        else point.y += pushDown + gap;

        return point;
      }

      function getBlockedRects({ width, height, hasDialogue, hasAnimalEffect, hasProgressHint, hasLearningPanel, isMobile, isMobileLandscape }) {
        const side = isMobile ? 14 : 20;
        const headerHeight = isMobileLandscape ? 78 : isMobile ? 90 : 86;
        const observeWidth = isMobile ? Math.min(width - 28, 340) : 390;
        const observeHeight = isMobile ? 170 : 150;
        const navHeight = isMobileLandscape ? 58 : isMobile ? 156 : 146;
        const rects = [
          { left: side, right: width - side, top: 0, bottom: headerHeight },
          {
            left: side,
            right: width - side,
            top: height - navHeight - side,
            bottom: height - side,
          },
        ];

        if (!isMobileLandscape) {
          rects.push({
            left: side,
            right: side + observeWidth,
            top: headerHeight + 18,
            bottom: headerHeight + 18 + observeHeight,
          });
        }

        if (hasDialogue && !isMobileLandscape) {
          rects.push({
            left: side,
            right: side + (isMobile ? Math.min(width - 28, 340) : 360),
            top: height - navHeight - side - (isMobile ? 270 : 245),
            bottom: height - navHeight - side - 12,
          });
        }

        if (hasAnimalEffect || (hasProgressHint && isMobileLandscape)) {
          if (isMobileLandscape) {
            const toastWidth = Math.min(202, width - side * 2);
            const toastHeight = 72;
            const toastBottom = height - navHeight - side - 12;
            rects.push({
              left: width - side - toastWidth,
              right: width - side,
              top: toastBottom - toastHeight,
              bottom: toastBottom,
            });
          } else {
            const toastWidth = isMobile ? Math.min(width - 28, 320) : 420;
            const toastLeft = (width - toastWidth) / 2;
            rects.push({
              left: toastLeft,
              right: toastLeft + toastWidth,
              top: headerHeight + 18,
              bottom: headerHeight + 138,
            });
          }
        }

        if (hasLearningPanel && !isMobile && !isMobileLandscape) {
          rects.push({
            left: width - 456,
            right: width,
            top: 0,
            bottom: height,
          });
        }

        return rects;
      }

      function layoutHotspots(hotspots, viewport, options) {
        const isMobile = viewport.width < 640 || options.isMobileLandscape;
        const safeRadius = isMobile ? 16 : 24;
        const blockedRects = getBlockedRects({
          width: viewport.width,
          height: viewport.height,
          hasDialogue: options.hasDialogue,
          hasAnimalEffect: options.hasAnimalEffect,
          hasProgressHint: options.hasProgressHint,
          hasLearningPanel: options.hasLearningPanel,
          isMobile,
          isMobileLandscape: options.isMobileLandscape,
        });

        const points = hotspots.map((hotspot, index) => {
          const size = estimateHotspotSize(hotspot, isMobile, options.isMobileLandscape);
          const offset = hotspot.offset || {};
          const dx = isMobile ? offset.mobileX ?? offset.x ?? 0 : offset.desktopX ?? offset.x ?? 0;
          const dy = isMobile ? offset.mobileY ?? offset.y ?? 0 : offset.desktopY ?? offset.y ?? 0;
          return {
            id: hotspot.id,
            hotspot,
            width: size.width,
            height: size.height,
            x: (hotspot.x / 100) * viewport.width + dx + (index % 2 ? 10 : -10),
            y: (hotspot.y / 100) * viewport.height + dy + (index % 3 - 1) * 8,
          };
        });

        for (let round = 0; round < 20; round++) {
          for (const point of points) {
            for (const rect of blockedRects) {
              pushAwayFromRect(point, rect, safeRadius);
            }

            point.x = clamp(point.x, point.width / 2 + safeRadius, viewport.width - point.width / 2 - safeRadius);
            point.y = clamp(point.y, point.height / 2 + safeRadius, viewport.height - point.height / 2 - safeRadius);
          }

          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const a = points[i];
              const b = points[j];
              const ar = rectFromPoint(a);
              const br = rectFromPoint(b);
              if (!rectsOverlap(ar, br, safeRadius)) continue;

              const overlapX = Math.min(ar.right + safeRadius - br.left, br.right + safeRadius - ar.left);
              const overlapY = Math.min(ar.bottom + safeRadius - br.top, br.bottom + safeRadius - ar.top);

              if (overlapX < overlapY) {
                const direction = a.x <= b.x ? -1 : 1;
                const push = overlapX / 2 + 12;
                a.x += direction * push;
                b.x -= direction * push;
              } else {
                const direction = a.y <= b.y ? -1 : 1;
                const push = overlapY / 2 + 12;
                a.y += direction * push;
                b.y -= direction * push;
              }
            }
          }
        }

        for (let i = 0; i < points.length; i++) {
          for (let j = i + 1; j < points.length; j++) {
            const a = points[i];
            const b = points[j];
            const ar = rectFromPoint(a);
            const br = rectFromPoint(b);
            if (!rectsOverlap(ar, br, safeRadius)) continue;

            const leftPoint = a.x <= b.x ? a : b;
            const rightPoint = a.x <= b.x ? b : a;
            const leftRect = rectFromPoint(leftPoint);
            const rightRect = rectFromPoint(rightPoint);
            const needed = leftRect.right + safeRadius - rightRect.left + 8;

            if (needed > 0 && rightPoint.x + needed + rightPoint.width / 2 + safeRadius <= viewport.width) {
              rightPoint.x += needed;
            } else if (needed > 0 && leftPoint.x - needed - leftPoint.width / 2 - safeRadius >= 0) {
              leftPoint.x -= needed;
            } else {
              b.y += br.top >= ar.top ? safeRadius + 24 : -(safeRadius + 24);
            }
          }
        }

        for (const point of points) {
          point.x = clamp(point.x, point.width / 2 + safeRadius, viewport.width - point.width / 2 - safeRadius);
          point.y = clamp(point.y, point.height / 2 + safeRadius, viewport.height - point.height / 2 - safeRadius);
        }

        return points.map((point) => ({
          ...point.hotspot,
          displayX: (point.x / viewport.width) * 100,
          displayY: (point.y / viewport.height) * 100,
          displayWidth: point.width,
        }));
      }

          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = cachedEnglishVoice?.lang || "en-US";
          if (cachedEnglishVoice) utterance.voice = cachedEnglishVoice;
          utterance.rate = rate;
          utterance.pitch = 1;
          utterance.volume = 1;
          utterance.onend = () => {
            if (activeSpeechToken === speechToken) setPlayingKey(null);
          };

            if (activeSpeechToken === speechToken) setPlayingKey(null);
          };
          setPlayingKey(key);

                      <p className="text-[10px] font-black uppercase tracking-[0.18em] text-banana">Saved</p>
                      <p className="mt-2 text-3xl font-black text-white">{savedWords.length}</p>
                    </div>
                  </div>

                  <div className="mt-5 rounded-2xl border border-white/12 bg-black/18 p-4">
                    <p className="text-[10px] font-black uppercase tracking-[0.18em] text-banana">
                      Word Book
                    </p>
                    <p className="mt-2 text-lg font-black leading-8 text-white">
                      {savedWords.length ? savedWords.map((item) => item.word).join(", ") : "No saved words yet."}
                    </p>
                  </div>

                  <div className="mt-6 flex flex-wrap gap-3">
                    <button
                      onClick={restartTrip}
                      className="rounded-full bg-banana px-6 py-3 font-black text-ink shadow-label transition hover:bg-[#ffc83f]"
                    >
                      <ButtonCopy en={restartLabel} zh={restartZh} />
                    </button>
                    {isZooChapter ? (
                      <button
                        onClick={() => speakEnglish("Next scene coming soon.", 0.9, "nextScene")}
                        className="rounded-full border border-white/18 bg-white/12 px-6 py-3 font-black text-white transition hover:bg-white/22"
                      >
                        <span className="inline-flex items-center gap-2">
                          {playingKey === "nextScene" && <SoundBars />}
                          <ButtonCopy en="Next Scene Coming Soon" zh="下个场景即将开放" />
                        </span>
                      </button>
                    ) : (
                      <button
                        onClick={() => {
                          setShowEnding(false);
                          setCurrentView("sceneSelect");
                        }}
                        className="rounded-full border border-white/18 bg-white/12 px-6 py-3 font-black text-white transition hover:bg-white/22"
                      >
                        <ButtonCopy en="Back to Scenes" zh="返回场景选择" />
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}
            {showLandscapePrompt && <LandscapePrompt />}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
