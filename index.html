    <style>
      @keyframes leafDrift {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(-1deg); }

      }

      @keyframes lightBreath {

        50% { opacity: 0.42; transform: translate3d(2%, 1%, 0) scale(1.06); }
      }

      @keyframes sceneReveal {
        from { opacity: 0; filter: blur(8px); transform: scale(1.08); }
        to { opacity: 1; filter: blur(0); transform: scale(1); }
      }

      @keyframes walkingFlash {
        0% { opacity: 0; transform: scale(1); filter: blur(0); }
        35% { opacity: 0.62; transform: scale(1.06); filter: blur(4px); }
        100% { opacity: 0; transform: scale(1.18); filter: blur(0); }
      }

      @keyframes hudFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }

      @keyframes hotspotPulse {

      }

      @keyframes hotspotBreathe {
        0%, 100% { transform: translate(-50%, -50%) translateY(0) scale(1); }
        50% { transform: translate(-50%, -50%) translateY(-2px) scale(1.01); }
      }

      @keyframes tapBounce {
        0% { transform: translate(-50%, -50%) scale(1); }
        45% { transform: translate(-50%, -50%) scale(0.9); }
        100% { transform: translate(-50%, -50%) scale(1); }
      }

      @keyframes clickRipple {
        from { opacity: 0.85; transform: translate(-50%, -50%) scale(0.45) rotate(-8deg); }
        to { opacity: 0; transform: translate(-50%, -70%) scale(1.65) rotate(12deg); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes welcomeFadeOut {
        from { opacity: 1; filter: blur(0); }
        to { opacity: 0; filter: blur(8px); }
      }

      @keyframes welcomeProgress {
        from { transform: scaleX(1); }
        to { transform: scaleX(0); }
      }

      @keyframes cardSlideIn {
        from { opacity: 0; transform: translateX(38px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes choicePop {
        0% { transform: scale(1); }
        45% { transform: scale(0.97); }
        100% { transform: scale(1); }
      }

      @keyframes soundBars {
        0%, 100% { transform: scaleY(0.45); opacity: 0.55; }
        50% { transform: scaleY(1); opacity: 1; }
      }

      @keyframes pandaBreath {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.18; }
        50% { transform: translate(-50%, -52%) scale(1.08); opacity: 0.32; }
      }

      @keyframes pandaSnack {
        0%, 100% { transform: translateY(0) rotate(-8deg) scale(1); opacity: 0.7; }
        50% { transform: translateY(5px) rotate(6deg) scale(0.92); opacity: 1; }
      }

      @keyframes actionToast {
        0% { opacity: 0; transform: translate(-50%, 10px) scale(0.98); }
        14% { opacity: 1; transform: translate(-50%, 0) scale(1); }
        82% { opacity: 1; transform: translate(-50%, 0) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -8px) scale(0.98); }
      }

      @keyframes bambooLeafSway {
        0%, 100% { transform: translateX(0) rotate(-2deg); }
        50% { transform: translateX(8px) rotate(3deg); }
      }

      @keyframes monkeyHop {
        0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(-4deg); opacity: 0.34; }
        38% { transform: translate(-50%, -56%) translateY(-16px) rotate(6deg); opacity: 0.5; }
        68% { transform: translate(-47%, -50%) translateY(2px) rotate(-2deg); opacity: 0.42; }
      }

      @keyframes playfulLeaves {
        0% { opacity: 0; transform: translateY(8px) rotate(-12deg) scale(0.78); }
        35% { opacity: 0.9; }
        100% { opacity: 0; transform: translateY(-34px) rotate(18deg) scale(1.08); }
      }

      @keyframes waterDrop {
        0% { opacity: 0; transform: translate(0, 0) scale(0.62); }
        20% { opacity: 0.9; }
        100% { opacity: 0; transform: translate(var(--drop-x), var(--drop-y)) scale(1); }
      }

      @keyframes lionSoftShake {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        22% { transform: translate3d(-3px, 1px, 0) scale(1.004); }
        48% { transform: translate3d(3px, -1px, 0) scale(1.006); }
        72% { transform: translate3d(-1px, 1px, 0) scale(1.002); }
      }

      @keyframes warmRoar {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
        28% { opacity: 0.34; }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.9); }
      }

      @keyframes roarDim {
        0%, 100% { opacity: 0; }
        24% { opacity: 0.22; }
        72% { opacity: 0.14; }
      }

      @keyframes pandaNibble {
        0%, 100% { transform: translateY(0) rotate(-3deg); }
        50% { transform: translateY(4px) rotate(4deg); }
      }

        0%, 100% { transform: translate(-50%, -50%) translateY(0) scale(1); opacity: 0.16; }
        50% { transform: translate(-50%, -54%) translateY(-8px) scale(1.1); opacity: 0.28; }
      }

      @keyframes tallLeavesRustle {
        0%, 100% { transform: translateX(0) rotate(-2deg); opacity: 0.26; }
        50% { transform: translateX(10px) rotate(4deg); opacity: 0.42; }
      }

      .hotspot-label {
        max-width: min(42vw, 168px);
        overflow-wrap: anywhere;
        text-wrap: balance;
      }

      .hotspot-sign {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 245, 204, 0.28), transparent 28%),
          linear-gradient(145deg, rgba(140, 91, 45, 0.9), rgba(88, 57, 31, 0.86));
        border-color: rgba(255, 232, 162, 0.82);
        color: #fff8e7;
        box-shadow: 0 12px 26px rgba(44, 28, 13, 0.26);
      }

      .hotspot-sign::before {
        content: "";
        position: absolute;
        left: 12px;
        top: -7px;
        width: 15px;
        height: 10px;
        border-radius: 999px 999px 999px 0;
        background: linear-gradient(135deg, #82bd63, #3f7f45);
        transform: rotate(-24deg);
        box-shadow: 0 2px 7px rgba(31, 79, 38, 0.22);
      }

      .hotspot-sign::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -7px;
        width: 12px;
        height: 12px;
        border-right: 1px solid rgba(255, 232, 162, 0.6);
        border-bottom: 1px solid rgba(255, 232, 162, 0.6);
        background: rgba(98, 63, 34, 0.9);
        transform: translateX(-50%) rotate(45deg);
        border-radius: 2px;
      }

      .hotspot-sign:hover {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 248, 220, 0.34), transparent 30%),
          linear-gradient(145deg, rgba(158, 105, 53, 0.96), rgba(96, 65, 36, 0.94));
        box-shadow: 0 16px 34px rgba(44, 28, 13, 0.34), 0 0 20px rgba(255, 230, 142, 0.22);
      }

      .hotspot-sign.is-learned {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 248, 220, 0.24), transparent 28%),
          linear-gradient(145deg, rgba(84, 116, 70, 0.78), rgba(55, 82, 54, 0.76));
        border-color: rgba(207, 236, 164, 0.64);
        opacity: 0.82;
      }

      .hotspot-sign.is-action {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 250, 219, 0.36), transparent 30%),
          linear-gradient(145deg, rgba(166, 103, 46, 0.98), rgba(102, 62, 31, 0.96));
        border-color: rgba(255, 238, 176, 0.98);
        box-shadow: 0 14px 34px rgba(80, 43, 15, 0.36), 0 0 18px rgba(255, 216, 107, 0.18);
        opacity: 1;
      }

      .hotspot-sign.is-action::before {
        background: linear-gradient(135deg, #ffd86b, #82bd63);
      }

      .hotspot-sub {
        color: #ffe7a3;
      }

      .hotspot-type-badge {
        letter-spacing: 0.08em;
      }

      .hotspot-sign.is-learned .hotspot-sub {
        color: #ffffff;
      }

      @media (max-width: 640px) {
        .hotspot-label {
          max-width: 124px;
        }
      }

      .leaf-drift { animation: leafDrift 8s ease-in-out infinite; }
      .light-breath { animation: lightBreath 9s ease-in-out infinite; }
      .scene-reveal { animation: sceneReveal 760ms cubic-bezier(0.16, 1, 0.3, 1) both; }
      .walking-flash { animation: walkingFlash 820ms ease-out both; }
      .hud-float { animation: hudFloat 5s ease-in-out infinite; }
      .hotspot-active { animation: hotspotPulse 2.6s ease-in-out infinite; }
      .hotspot-breathe { animation: hotspotBreathe 3.4s ease-in-out infinite; }
      .hotspot-tapped { animation: tapBounce 260ms ease-out; }
      .ripple {
        animation: clickRipple 680ms ease-out both;
        background: radial-gradient(circle at 35% 35%, rgba(255, 238, 176, 0.82), rgba(120, 178, 86, 0.28) 52%, transparent 72%);
        clip-path: ellipse(42% 58% at 50% 50%);
      }
      .dialogue-enter { animation: fadeInUp 420ms ease-out both; }
      .welcome-exit { animation: welcomeFadeOut 620ms ease-in both; }
      .card-slide-in { animation: cardSlideIn 360ms cubic-bezier(0.16, 1, 0.3, 1) both; }
      .choice-pop { animation: choicePop 260ms ease-out; }
      .sound-bar { animation: soundBars 640ms ease-in-out infinite; transform-origin: bottom; }
      .sound-bar:nth-child(2) { animation-delay: 120ms; }
      .sound-bar:nth-child(3) { animation-delay: 240ms; }
      .panda-breath { animation: pandaBreath 4.4s ease-in-out infinite; }
      .panda-snack { animation: pandaSnack 1.25s ease-in-out infinite; transform-origin: center; }
      .bamboo-leaf-sway { animation: bambooLeafSway 5.8s ease-in-out infinite; }
      .monkey-hop { animation: monkeyHop 2.4s ease-in-out infinite; }
      .playful-leaf { animation: playfulLeaves 860ms ease-out both; }
      .water-drop { animation: waterDrop 900ms ease-out both; }
      .lion-soft-shake { animation: lionSoftShake 520ms ease-out both; }
      .warm-roar { animation: warmRoar 760ms ease-out both; }
      .roar-dim { animation: roarDim 900ms ease-out both; }
      .panda-nibble { animation: pandaNibble 620ms ease-in-out 2; }
      .action-toast { animation: actionToast var(--action-duration, 2600ms) ease-out both; }
      .giraffe-reach-glow { animation: giraffeReachGlow 2.8s ease-in-out infinite; }
      .tall-leaves-rustle { animation: tallLeavesRustle 4.2s ease-in-out infinite; }
    </style>

      let cachedEnglishVoice = null;

      function getBestEnglishVoice() {
        if (!("speechSynthesis" in window)) return null;
        const voices = window.speechSynthesis.getVoices();
        if (!voices.length) return cachedEnglishVoice;

        const priorityNames = [
          "Google US English",
          "Google UK English Female",
          "Microsoft Jenny",
          "Samantha",
          "Alex",
          "Daniel",
        ];

        const englishVoices = voices.filter((voice) =>
          voice.lang?.toLowerCase().startsWith("en")
        );

        const byPriorityName = priorityNames
          .map((name) =>
            englishVoices.find((voice) =>
              voice.name.toLowerCase().includes(name.toLowerCase())
            )
          )
          .find(Boolean);

        const naturalEnglish = englishVoices.find((voice) => {
          const name = voice.name.toLowerCase();
          return (
            ["google", "microsoft", "samantha", "alex", "daniel"].some((token) =>
              name.includes(token)
            ) && ["en-us", "en-gb"].includes(voice.lang.toLowerCase())
          );
        });

        const usOrGb = englishVoices.find((voice) =>
          ["en-us", "en-gb"].includes(voice.lang.toLowerCase())
        );

        cachedEnglishVoice = byPriorityName || naturalEnglish || usOrGb || englishVoices[0] || voices[0] || null;
        return cachedEnglishVoice;
      }

      function useViewportSize() {
        const [size, setSize] = useState({
          width: window.innerWidth || 1280,
          height: window.innerHeight || 720,
        });

        useEffect(() => {
          function handleResize() {
            setSize({
              width: window.innerWidth || 1280,
              height: window.innerHeight || 720,
            });
          }

          window.addEventListener("resize", handleResize);
          return () => window.removeEventListener("resize", handleResize);
        }, []);

        return size;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function estimateHotspotSize(hotspot, isMobile) {
        const longest = Math.max(hotspot.label.length, hotspot.zh.length);
        const maxWidth = isMobile ? 124 : 168;
        const minWidth = isMobile ? 72 : 82;
        const charWidth = isMobile ? 7.2 : 8.2;
        const width = clamp(longest * charWidth + 30, minWidth, maxWidth);
        const lines = Math.ceil((longest * charWidth + 30) / maxWidth);
        const height = clamp(42 + (lines - 1) * 16, 42, isMobile ? 76 : 84);
        return { width, height };
      }

      function rectFromPoint(point) {
        return {
          left: point.x - point.width / 2,
          right: point.x + point.width / 2,
          top: point.y - point.height / 2,
          bottom: point.y + point.height / 2,
        };
      }

      function rectsOverlap(a, b, gap = 0) {
        return (
          a.left - gap < b.right &&
          a.right + gap > b.left &&
          a.top - gap < b.bottom &&
          a.bottom + gap > b.top
        );
      }

      function pushAwayFromRect(point, rect, gap) {
        const self = rectFromPoint(point);
        if (!rectsOverlap(self, rect, gap)) return point;

        const pushLeft = Math.abs(self.right - rect.left);
        const pushRight = Math.abs(rect.right - self.left);
        const pushUp = Math.abs(self.bottom - rect.top);
        const pushDown = Math.abs(rect.bottom - self.top);
        const minPush = Math.min(pushLeft, pushRight, pushUp, pushDown);

        if (minPush === pushLeft) point.x -= pushLeft + gap;
        else if (minPush === pushRight) point.x += pushRight + gap;
        else if (minPush === pushUp) point.y -= pushUp + gap;
        else point.y += pushDown + gap;

        return point;
      }

      function getBlockedRects({ width, height, hasDialogue, hasAnimalEffect, isMobile }) {
        const side = isMobile ? 14 : 20;
        const headerHeight = isMobile ? 90 : 86;
        const observeWidth = isMobile ? Math.min(width - 28, 340) : 390;
        const observeHeight = isMobile ? 170 : 150;
        const navHeight = isMobile ? 112 : 106;
        const rects = [
          { left: side, right: width - side, top: side, bottom: headerHeight },
          {
            left: side,
            right: side + observeWidth,
            top: headerHeight + 18,
            bottom: headerHeight + 18 + observeHeight,
          },
          {
            left: side,
            right: width - side,
            top: height - navHeight - side,
            bottom: height - side,
          },
        ];

        if (hasDialogue) {
          rects.push({
            left: side,
            right: side + (isMobile ? Math.min(width - 28, 340) : 360),
            top: height - navHeight - side - (isMobile ? 270 : 245),
            bottom: height - navHeight - side - 12,
          });
        }

        if (hasAnimalEffect) {
          const toastWidth = isMobile ? Math.min(width - 28, 320) : 420;
          const toastLeft = (width - toastWidth) / 2;
          rects.push({
            left: toastLeft,
            right: toastLeft + toastWidth,
            top: headerHeight + 18,
            bottom: headerHeight + 138,
          });
        }

        return rects;
      }

      function layoutHotspots(hotspots, viewport, options) {
        const isMobile = viewport.width < 640;
        const safeRadius = isMobile ? 16 : 24;
        const blockedRects = getBlockedRects({
          width: viewport.width,
          height: viewport.height,
          hasDialogue: options.hasDialogue,
          hasAnimalEffect: options.hasAnimalEffect,
          isMobile,
        });

        const points = hotspots.map((hotspot, index) => {
          const size = estimateHotspotSize(hotspot, isMobile);
          const offset = hotspot.offset || {};
          const dx = isMobile ? offset.mobileX ?? offset.x ?? 0 : offset.desktopX ?? offset.x ?? 0;
          const dy = isMobile ? offset.mobileY ?? offset.y ?? 0 : offset.desktopY ?? offset.y ?? 0;
          return {
            id: hotspot.id,
            hotspot,
            width: size.width,
            height: size.height,
            x: (hotspot.x / 100) * viewport.width + dx + (index % 2 ? 10 : -10),
            y: (hotspot.y / 100) * viewport.height + dy + (index % 3 - 1) * 8,
          };
        });

        for (let round = 0; round < 20; round++) {
          for (const point of points) {
            for (const rect of blockedRects) {
              pushAwayFromRect(point, rect, safeRadius);
            }

            point.x = clamp(point.x, point.width / 2 + safeRadius, viewport.width - point.width / 2 - safeRadius);
            point.y = clamp(point.y, point.height / 2 + safeRadius, viewport.height - point.height / 2 - safeRadius);
          }

          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const a = points[i];
              const b = points[j];
              const ar = rectFromPoint(a);
              const br = rectFromPoint(b);
              if (!rectsOverlap(ar, br, safeRadius)) continue;

              const overlapX = Math.min(ar.right + safeRadius - br.left, br.right + safeRadius - ar.left);
              const overlapY = Math.min(ar.bottom + safeRadius - br.top, br.bottom + safeRadius - ar.top);

              if (overlapX < overlapY) {
                const direction = a.x <= b.x ? -1 : 1;
                const push = overlapX / 2 + 12;
                a.x += direction * push;
                b.x -= direction * push;
              } else {
                const direction = a.y <= b.y ? -1 : 1;
                const push = overlapY / 2 + 12;
                a.y += direction * push;
                b.y -= direction * push;
              }
            }
          }
        }

        for (let i = 0; i < points.length; i++) {
          for (let j = i + 1; j < points.length; j++) {
            const a = points[i];
            const b = points[j];
            const ar = rectFromPoint(a);
            const br = rectFromPoint(b);
            if (!rectsOverlap(ar, br, safeRadius)) continue;

            const leftPoint = a.x <= b.x ? a : b;
            const rightPoint = a.x <= b.x ? b : a;
            const leftRect = rectFromPoint(leftPoint);
            const rightRect = rectFromPoint(rightPoint);
            const needed = leftRect.right + safeRadius - rightRect.left + 8;

            if (needed > 0 && rightPoint.x + needed + rightPoint.width / 2 + safeRadius <= viewport.width) {
              rightPoint.x += needed;
            } else if (needed > 0 && leftPoint.x - needed - leftPoint.width / 2 - safeRadius >= 0) {
              leftPoint.x -= needed;
            } else {
              b.y += br.top >= ar.top ? safeRadius + 24 : -(safeRadius + 24);
            }
          }
        }

        for (const point of points) {
          point.x = clamp(point.x, point.width / 2 + safeRadius, viewport.width - point.width / 2 - safeRadius);
          point.y = clamp(point.y, point.height / 2 + safeRadius, viewport.height - point.height / 2 - safeRadius);
        }

        return points.map((point) => ({
          ...point.hotspot,
          displayX: (point.x / viewport.width) * 100,
          displayY: (point.y / viewport.height) * 100,
          displayWidth: point.width,
        }));
      }

          const hotspot = hotspotById[hotspotId];
          const learned = learnedHotspotKeys.includes(`${currentScene.id}:${hotspotId}`);

            hotspot?.type === "action" && completedActions.includes(currentScene.id);
          return learned || actionDone;

        const arrangedHotspots = layoutHotspots(visibleHotspots, viewport, {

        const missingRequiredLabels = missingRequiredHotspots.map((id) => hotspotById[id]?.word || id);
        const hasAllWords = missingRequiredHotspots.length === 0;

        function speakEnglish(text, rate = 0.9, key = text) {
          if (!("speechSynthesis" in window)) return;
          window.speechSynthesis.cancel();
          const voice = getBestEnglishVoice();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = voice?.lang || "en-US";
          utterance.voice = voice;
          utterance.rate = rate;
          utterance.pitch = 1;
          utterance.volume = 1;
          utterance.onend = () => setPlayingKey(null);
          utterance.onerror = () => setPlayingKey(null);
          setPlayingKey(key);
          window.speechSynthesis.speak(utterance);

          setLearnedWords((words) => (words.includes(word) ? words : [...words, word]));

            duration,

                      <div className="playful-leaf absolute left-[56%] top-[46%] h-5 w-3 rounded-full bg-[#6fab55] [animation-delay:0.24s]"></div>

                    ["58%", "53%", "72px", "-26px", "0.24s"],

              <button
                onClick={walkForward}
                className={`shrink-0 rounded-full px-4 py-2 text-sm font-black shadow-label transition hover:-translate-y-0.5 active:translate-y-0 ${
                  sceneComplete
                    ? "bg-banana text-ink hover:bg-[#ffc83f]"
                    : "border border-banana/40 bg-white/12 text-white hover:bg-white/22"
                }`}
              >
                {nextActionLabel}
              </button>
            </header>

            <button
              onClick={() => speakEnglish(currentScene.intro.text, 0.9, `${currentScene.id}-intro`)}
              className="dialogue-enter absolute left-4 top-[calc(env(safe-area-inset-top)+6.5rem)] z-20 max-h-[20vh] max-w-[340px] overflow-auto rounded-2xl border border-white/18 bg-nightglass p-3 text-left shadow-glow backdrop-blur-xl transition hover:bg-[#143423]/80 active:scale-[0.99] sm:left-6 md:max-w-[390px]"
            >
              <p className="text-[10px] font-black uppercase tracking-[0.22em] text-banana">
                Observe
              </p>
              <p className="mt-2 text-base font-black leading-6 text-white md:text-lg md:leading-7">
                <span className="inline-flex items-center gap-2">
                  {playingKey === `${currentScene.id}-intro` && <SoundBars />}
                  {currentScene.intro.text}
                </span>
              </p>
              <p className="mt-1 text-sm font-bold leading-6 text-cream/78">
                {currentScene.intro.zh}
              </p>
            </button>

            {progressHint && (
              <div className="dialogue-enter absolute left-1/2 top-[25%] z-40 -translate-x-1/2 rounded-full border border-banana/40 bg-[#112319]/88 px-5 py-3 text-sm font-black text-white shadow-glow backdrop-blur-xl">
                {progressHint}
              </div>
            )}

            {currentDialogue && !showEnding && (
              <div className="dialogue-enter absolute bottom-[calc(env(safe-area-inset-bottom)+8.75rem)] left-4 z-20 max-h-[30vh] w-[calc(100vw-2rem)] max-w-[340px] overflow-auto rounded-2xl border border-white/22 bg-nightglass p-3 shadow-glow backdrop-blur-xl sm:left-6 md:max-w-[360px] md:p-4">
                <button
                  onClick={() => speakEnglish(currentDialogue.text, 0.9, `${currentDialogue.id}-line`)}
                  className="mb-2 inline-flex items-center gap-2 rounded-full bg-banana px-3 py-1 text-[11px] font-black uppercase text-ink transition active:scale-95"
                >
                  {playingKey === `${currentDialogue.id}-line` && <SoundBars />}
                  {currentDialogue.speaker}
                </button>
                <p className="text-lg font-black leading-7 text-white">{currentDialogue.text}</p>
                <p className="mt-1 text-sm font-bold leading-6 text-cream/80">
                  {currentDialogue.translation}
                </p>
                <div className="mt-3 grid gap-2">
                  {currentDialogue.options.map((option) => (
                    <button
                      key={option.text}
                      onClick={() => {
                        setClickedChoice(option.text);
                        setDialogueReply(option);
                        speakEnglish(option.text, 0.9, `dialogue-${option.text}`);
                        setConversationDone((items) =>
                          items.includes(currentDialogue.id) ? items : [...items, currentDialogue.id]
                        );
                        window.setTimeout(() => setClickedChoice(null), 280);
                      }}
                      className={`rounded-xl border border-white/20 bg-white/12 px-3 py-2 text-left text-sm font-black text-white transition hover:border-banana/50 hover:bg-white/22 active:scale-[0.98] ${
                        clickedChoice === option.text ? "choice-pop bg-banana/24" : ""
                      }`}
                    >
                      <span className="inline-flex items-center gap-2">
                        {playingKey === `dialogue-${option.text}` && <SoundBars />}
                        {option.text}
                      </span>
                      <span className="mt-1 block text-xs font-bold text-cream/68">
                        {option.choiceZh}
                      </span>
                    </button>
                  ))}
                </div>
                {dialogueReply && (
                  <div className="dialogue-enter mt-3 rounded-xl bg-banana/18 p-3">
                    <div className="mb-3 rounded-lg bg-white/10 p-2">
                      <p className="text-[10px] font-black uppercase tracking-[0.14em] text-banana">You chose</p>
                      <p className="mt-1 text-sm font-black text-white">{dialogueReply.text}</p>
                      <p className="mt-1 text-xs font-bold text-cream/72">{dialogueReply.choiceZh}</p>
                    </div>
                    <button
                      onClick={() => speakEnglish(dialogueReply.reply, 0.86, `reply-${dialogueReply.reply}`)}
                      className="text-left text-sm font-black text-white"
                    >
                      <span className="inline-flex items-center gap-2">
                        {playingKey === `reply-${dialogueReply.reply}` && <SoundBars />}
                        {dialogueReply.reply}
                      </span>
                    </button>
                    <p className="mt-1 text-xs font-bold text-cream/75">
                      {dialogueReply.translation}
                    </p>
                  </div>
                )}
              </div>
            )}

            {sceneComplete && !showEnding && (
              <div className="dialogue-enter absolute right-4 top-[calc(env(safe-area-inset-top)+6.5rem)] z-30 hidden max-h-[24vh] max-w-[330px] overflow-auto rounded-2xl border border-banana/35 bg-[#112319]/78 p-4 text-right shadow-glow backdrop-blur-xl md:block">
                <p className="text-lg font-black text-white">
                  {currentScene.completeText || "Great! Let's keep walking."}
                </p>
                <p className="mt-1 text-sm font-bold text-cream/80">
                  {currentScene.completeZh || "太棒了，我们继续往前走吧。"}
                </p>
              </div>
            )}

            <div className="pointer-events-none absolute bottom-[calc(env(safe-area-inset-bottom)+8.25rem)] right-6 z-30 hidden max-w-[320px] rounded-2xl border border-white/16 bg-nightglass px-4 py-3 text-right shadow-glow backdrop-blur-xl md:block">
              <p className="text-[10px] font-black uppercase tracking-[0.22em] text-banana">Now</p>
              <p className="text-xl font-black text-white">
                {currentScene.title} <span className="text-banana">{currentScene.zh}</span>
              </p>
              <p className="mt-1 text-xs font-black text-cream/75">
                Words {learnedRequiredCount}/{requiredHotspotIds.length}
                {hasDialogue ? " · Dialogue ✓" : currentScene.npc ? " · Dialogue pending" : ""}
              </p>
            </div>

            <nav className="absolute bottom-[calc(env(safe-area-inset-bottom)+1rem)] left-4 right-4 z-40 mx-auto max-w-5xl rounded-2xl border border-white/18 bg-nightglass p-3 shadow-glow backdrop-blur-xl sm:left-6 sm:right-6">
              <div className="mb-2 flex items-center justify-between gap-3">
                <p className="text-[10px] font-black uppercase tracking-[0.24em] text-banana">
                  Trip Map
                </p>
                <p className="hidden text-sm font-black text-cream/85 sm:block">
                  已完成的区域会打勾
                </p>
              </div>
              <div className="flex gap-2 overflow-x-auto pb-1">
                {scenes.map((scene, index) => {
                  const done = index < currentIndex || showEnding;
                  const active = index === currentIndex && !showEnding;
                  return (
                    <button
                      key={scene.id}
                      onClick={() => index <= currentIndex && moveTo(index)}
                      className={`min-h-[42px] min-w-[92px] rounded-xl px-3 text-center text-xs font-black transition hover:-translate-y-0.5 active:translate-y-0 ${
                        active
                          ? "bg-coral text-white"
                          : done
                          ? "bg-white/18 text-cream hover:bg-white/26"
                          : "bg-black/18 text-white/38"
                      }`}
                    >
                      {done ? "✓ " : ""}
                      {scene.short}
                    </button>
                  );
                })}
              </div>
            </nav>

            {selectedHotspot && (
              <aside className="card-slide-in fixed bottom-0 right-0 top-0 z-40 flex w-full max-w-md flex-col border-l border-white/16 bg-[#112319]/88 text-cream shadow-glow backdrop-blur-2xl sm:rounded-l-3xl">
                <div className="flex items-start justify-between gap-3 border-b border-white/12 p-5">
                  <div>
                    <p className="text-[10px] font-black uppercase tracking-[0.24em] text-banana">
                      Explore Word
                    </p>
                    <h2 className="mt-2 text-5xl font-black text-white">{selectedHotspot.word}</h2>
                    <p className="mt-2 text-2xl font-extrabold text-banana">
                      {selectedHotspot.phonetic}
                    </p>
                  </div>
                  <button
                    onClick={() => setSelectedHotspot(null)}
                    className="grid h-10 w-10 shrink-0 place-items-center rounded-full bg-white/12 text-2xl font-black text-white transition hover:bg-white/22 active:scale-95"
                    aria-label="Close card"
                  >
                    ×
                  </button>
                </div>

                <div className="flex-1 overflow-auto p-5">
                  <div className="rounded-2xl border border-white/12 bg-white/10 p-4">
                    <p className="text-[10px] font-black uppercase tracking-[0.2em] text-banana">
                      中文意思
                    </p>
                    <p className="mt-2 text-2xl font-black text-white">{selectedHotspot.meaning}</p>
                  </div>

                  <div className="mt-4 rounded-2xl border border-white/12 bg-black/18 p-4">
                    <p className="text-[10px] font-black uppercase tracking-[0.2em] text-coral">
                      Example
                    </p>
                    <p className="mt-2 text-2xl font-black leading-9 text-white">
                      {selectedHotspot.example}
                    </p>
                    <p className="mt-2 text-lg font-bold leading-8 text-cream/78">
                      {selectedHotspot.translation}
                    </p>
                  </div>

                  <div className="mt-5 grid grid-cols-2 gap-3">
                    <button
                      onClick={() => speakEnglish(selectedHotspot.word, 0.9, `${selectedHotspot.id}-normal`)}
                      className="rounded-2xl bg-banana px-4 py-3 text-base font-black text-ink shadow-label transition hover:-translate-y-0.5 hover:bg-[#ffc83f] active:translate-y-0"
                    >
                      <span className="inline-flex items-center justify-center gap-2">
                        {playingKey === `${selectedHotspot.id}-normal` && <SoundBars />}
                        Normal
                      </span>
                    </button>
                    <button
                      onClick={() => speakEnglish(selectedHotspot.word, 0.65, `${selectedHotspot.id}-slow`)}
                      className="rounded-2xl border border-banana/40 bg-white/12 px-4 py-3 text-base font-black text-white shadow-label transition hover:-translate-y-0.5 hover:bg-white/22 active:translate-y-0"
                    >
                      <span className="inline-flex items-center justify-center gap-2">
                        {playingKey === `${selectedHotspot.id}-slow` && <SoundBars />}
                        Slow
                      </span>
                    </button>
                  </div>

                  <button
                    onClick={() => speakEnglish(selectedHotspot.example, 0.86, `${selectedHotspot.id}-sentence`)}
                    className="mt-3 w-full rounded-2xl border border-white/18 bg-white/10 px-4 py-3 text-base font-black text-white transition hover:bg-white/20 active:scale-[0.99]"
                  >
                    <span className="inline-flex items-center justify-center gap-2">
                      {playingKey === `${selectedHotspot.id}-sentence` && <SoundBars />}
                      Play Sentence
                    </span>
                  </button>

                  <button
                    onClick={() => toggleSaveWord(selectedHotspot.word)}
                    className={`mt-3 w-full rounded-2xl px-4 py-3 text-base font-black shadow-label transition active:scale-[0.99] ${
                      savedWords.includes(selectedHotspot.word)
                        ? "bg-coral text-white"
                        : "bg-white/12 text-white hover:bg-white/22"
                    }`}
                  >
                    {savedWords.includes(selectedHotspot.word) ? "Saved to Word Book" : "Add to Word Book"}
                  </button>

                  <button
                    onClick={walkForward}
                    className={`mt-6 w-full rounded-2xl px-4 py-4 text-lg font-black shadow-label transition hover:-translate-y-0.5 active:translate-y-0 ${
                      sceneComplete
                        ? "bg-coral text-white hover:bg-[#f36a5b]"
                        : "border border-banana/35 bg-white/12 text-white hover:bg-white/22"
                    }`}
                  >
                    {nextActionLabel}
                  </button>
                </div>
              </aside>
            )}

            {showWelcome && (
              <div
                className={`fixed inset-0 z-50 flex items-center justify-center bg-black/52 px-4 backdrop-blur-sm ${
                  welcomeLeaving ? "welcome-exit" : ""
                }`}
              >
                <div className="dialogue-enter max-w-2xl rounded-3xl border border-white/18 bg-[#112319]/90 p-6 text-cream shadow-glow backdrop-blur-2xl">
                  <p className="text-[11px] font-black uppercase tracking-[0.24em] text-banana">Zoo Trip</p>
                  <h2 className="mt-3 text-3xl font-black text-white sm:text-5xl">Welcome to the zoo!</h2>
                  <p className="mt-4 text-xl font-black leading-8 text-white">
                    Today, you will explore the zoo, meet animals, and learn real English.
                  </p>
                  <p className="mt-3 text-lg font-bold leading-8 text-cream/82">
                    欢迎来到动物园！今天你会逛动物园、遇见动物，并学习真实场景英语。
                  </p>
                  <div className="mt-6 flex flex-wrap items-center gap-3">
                    <div className="h-2 w-36 overflow-hidden rounded-full bg-white/18">
                      <div className="h-full w-full origin-left animate-[welcomeProgress_4.2s_linear_forwards] bg-banana"></div>
                    </div>
                    <button
                      onClick={() => {
                        setWelcomeLeaving(true);
                        window.setTimeout(() => setShowWelcome(false), 250);
                      }}
                      className="rounded-full border border-banana/45 bg-white/12 px-5 py-3 font-black text-white transition hover:bg-white/22"
                    >
                      Skip
                    </button>
                  </div>
                </div>
              </div>
            )}

            {showEnding && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 backdrop-blur-sm">
                <div className="dialogue-enter max-h-[88vh] w-full max-w-3xl overflow-auto rounded-3xl border border-white/18 bg-[#112319]/92 p-6 text-cream shadow-glow backdrop-blur-2xl">
                  <p className="text-[11px] font-black uppercase tracking-[0.24em] text-banana">Trip Complete</p>
                  <h2 className="mt-3 text-3xl font-black text-white sm:text-5xl">
                    Great job! Your zoo trip is finished.
                  </h2>
                  <p className="mt-3 text-xl font-bold text-cream/82">
                    太棒了！今天的动物园之旅到此结束啦。
                  </p>

                  <div className="mt-6 grid gap-3 sm:grid-cols-3">
                    <div className="rounded-2xl border border-white/12 bg-white/10 p-4">
                      <p className="text-[10px] font-black uppercase tracking-[0.18em] text-banana">Words</p>
                      <p className="mt-2 text-3xl font-black text-white">{learnedWords.length}</p>
                    </div>
                    <div className="rounded-2xl border border-white/12 bg-white/10 p-4">
                      <p className="text-[10px] font-black uppercase tracking-[0.18em] text-banana">Dialogues</p>
                      <p className="mt-2 text-3xl font-black text-white">{conversationDone.length}</p>
                    </div>
                    <div className="rounded-2xl border border-white/12 bg-white/10 p-4">
                      <p className="text-[10px] font-black uppercase tracking-[0.18em] text-banana">Saved</p>
                      <p className="mt-2 text-3xl font-black text-white">{savedWords.length}</p>
                    </div>
                  </div>

                  <div className="mt-5 rounded-2xl border border-white/12 bg-black/18 p-4">
                    <p className="text-[10px] font-black uppercase tracking-[0.18em] text-banana">
                      Word Book
                    </p>
                    <p className="mt-2 text-lg font-black leading-8 text-white">
                      {savedWords.length ? savedWords.join(", ") : "No saved words yet."}
                    </p>
                  </div>

                  <div className="mt-6 flex flex-wrap gap-3">
                    <button
                      onClick={restartTrip}
                      className="rounded-full bg-banana px-6 py-3 font-black text-ink shadow-label transition hover:bg-[#ffc83f]"
                    >
                      Restart Trip
                    </button>
                    <button
                      onClick={() => speakEnglish("Next scene coming soon.", 0.9, "nextScene")}
                      className="rounded-full border border-white/18 bg-white/12 px-6 py-3 font-black text-white transition hover:bg-white/22"
                    >
                      <span className="inline-flex items-center gap-2">
                        {playingKey === "nextScene" && <SoundBars />}
                        Next Scene Coming Soon
                      </span>
                    </button>
                  </div>
                </div>
              </div>
            )}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
